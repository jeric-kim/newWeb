<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBI Cosmoney Admin</title>
  <style>
    :root { --primary:#3b45f3; --primary-strong:#2d36d9; --bg:#f6f8fc; --card:#fff; --line:#e5e7eb; --text:#111827; --sub:#667085; --danger:#dc2626; --shadow:0 16px 36px rgba(15,23,42,.08);}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif}
    .wrap{max-width:1100px;margin:0 auto;padding:28px 16px 40px}.login-card,.panel{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}.login-card{max-width:420px;margin:60px auto 0;padding:24px}
    h1,h2{margin:0}.sub{margin-top:8px;color:var(--sub);font-size:14px;line-height:1.6}.field{margin-top:14px}label{display:block;margin-bottom:8px;font-size:13px;font-weight:800}
    input{width:100%;height:50px;padding:0 14px;border:1px solid #d8deee;border-radius:14px;background:#fff;font-size:15px}
    button{border:0;border-radius:16px;cursor:pointer;font-weight:900}.btn{width:100%;height:52px;margin-top:18px;background:var(--primary);color:#fff}.btn:hover{background:var(--primary-strong)}
    .error{margin-top:10px;color:var(--danger);font-size:13px;display:none}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}.panel{padding:20px;display:none}
    .toolbar-actions{display:flex;gap:10px;flex-wrap:wrap}.small-btn{height:42px;padding:0 16px;background:#fff;border:1px solid var(--line);color:var(--text)}.primary-btn{height:42px;padding:0 16px;background:var(--primary);color:#fff}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}table{width:100%;border-collapse:collapse;min-width:1100px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}th{background:#f8faff;position:sticky;top:0;z-index:1}.count{font-size:14px;color:var(--sub)}.empty{padding:28px 16px;text-align:center;color:var(--sub)}.pill{display:inline-flex;align-items:center;height:28px;padding:0 10px;border-radius:999px;background:rgba(59,69,243,.08);color:var(--primary);font-weight:800;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loginCard" class="login-card">
      <h1>Admin Login</h1>
      <p class="sub">관리자 계정으로 로그인 후 신청 내역을 확인하세요.</p>
      <div class="field"><label for="adminId">ID</label><input id="adminId" type="text" placeholder="admin" /></div>
      <div class="field"><label for="adminPw">Password</label><input id="adminPw" type="password" placeholder="1111" /></div>
      <button id="loginBtn" class="btn" type="button">로그인</button>
      <div id="loginErr" class="error">ID 또는 비밀번호가 올바르지 않습니다.</div>
    </div>
    <div id="panel" class="panel">
      <div class="toolbar">
        <div><h2>SBI Cosmoney 신청 내역</h2><div id="countText" class="count">총 0건</div></div>
        <div class="toolbar-actions"><button id="refreshBtn" class="small-btn" type="button">새로고침</button><button id="downloadBtn" class="primary-btn" type="button">CSV 다운로드</button><button id="logoutBtn" class="small-btn" type="button">로그아웃</button></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>등록일시</th><th>영문 성</th><th>영문 이름</th><th>생년월일</th><th>성별</th><th>국적</th><th>선호 언어</th><th>이메일</th><th>휴대전화 번호</th><th>유입 경로</th><th>유입 경로 상세</th><th>SNS</th><th>SNS 계정</th></tr></thead>
          <tbody id="tbody"><tr><td colspan="13" class="empty">데이터를 불러오는 중입니다.</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    const CONFIG = { WEB_APP_URL:"PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE", ADMIN_ID:"admin", ADMIN_PW:"1111" };
    let rows = [];
    function escapeCsv(value){ const v=String(value ?? ""); if(/[",\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"'; return v; }
    async function fetchRows(){ if(!CONFIG.WEB_APP_URL || CONFIG.WEB_APP_URL.includes('PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE')) throw new Error('WEB_APP_URL_NOT_SET'); const res=await fetch(CONFIG.WEB_APP_URL + '?action=list'); const data=await res.json(); if(!data.success) throw new Error(data.message || 'FETCH_FAILED'); rows=data.rows || []; renderTable(); }
    function renderTable(){ countText.textContent=`총 ${rows.length}건`; if(!rows.length){ tbody.innerHTML='<tr><td colspan="13" class="empty">저장된 신청 내역이 없습니다.</td></tr>'; return; } tbody.innerHTML = rows.map(r=>`<tr><td>${r.createdAt || ''}</td><td>${r.lastName || ''}</td><td>${r.firstName || ''}</td><td>${r.birthDate || ''}</td><td><span class="pill">${r.gender || ''}</span></td><td>${r.nationality || ''}</td><td>${r.preferredLanguage || ''}</td><td>${r.email || ''}</td><td>${r.phone || ''}</td><td>${r.source || ''}</td><td>${r.sourceDetail || ''}</td><td>${r.snsChannel || ''}</td><td>${r.snsAccount || ''}</td></tr>`).join(''); }
    function downloadCsv(){ const headers=['createdAt','lastName','firstName','birthDate','gender','nationality','preferredLanguage','email','phone','source','sourceDetail','snsChannel','snsAccount']; const csv=[headers.join(','), ...rows.map(r=>headers.map(h=>escapeCsv(r[h])).join(','))].join('\n'); const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}); const link=document.createElement('a'); link.href=URL.createObjectURL(blob); link.download=`cosmoney_prejoin_${Date.now()}.csv`; document.body.appendChild(link); link.click(); link.remove(); URL.revokeObjectURL(link.href); }
    loginBtn.addEventListener('click', async ()=>{ const id=adminId.value.trim(); const pw=adminPw.value.trim(); if(id !== CONFIG.ADMIN_ID || pw !== CONFIG.ADMIN_PW){ loginErr.style.display='block'; return; } loginErr.style.display='none'; loginCard.style.display='none'; panel.style.display='block'; try{ await fetchRows(); } catch(e){ alert('데이터 조회에 실패했습니다. Apps Script URL을 확인해 주세요.'); console.error(e); } });
    refreshBtn.addEventListener('click', async ()=>{ try{ await fetchRows(); } catch(e){ alert('새로고침에 실패했습니다.'); } });
    downloadBtn.addEventListener('click', downloadCsv);
    logoutBtn.addEventListener('click', ()=>location.reload());
  </script>
</body>
</html>
