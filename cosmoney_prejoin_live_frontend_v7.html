r:'Passwords do not match.',pwRule:'At least 8 characters including uppercase, lowercase, number, and special character.',phoneLabel:'Mobile number',phoneHelper:'Optional field.',sourceLabel:'Referral source',sourceDetailLabel:'Referral details',snsChannelLabel:'Preferred SNS for consultation',snsAccountLabel:'SNS account',completeTitle:'Pre-registration completed',completeDesc:'You can now log in and review or edit your information in My Page.',saveImageBtn:'Save application as image',resetBtn:'Back to start',verificationSent:'Verification code sent.',savedOk:'Pre-registration completed.',savedFail:'Save failed. Please check your Apps Script URL.',loginTitle:'Login',loginDesc:'Log in with your email and password.',loginBtn:'Login',loginFail:'Login failed. Check your email or password.',mypageTitle:'My Page',mypageDesc:'You can manage your registered information and check upcoming features.',editProfileBtn:'Edit pre-registration info',logoutBtn:'Logout',bankPrepareBtn:'Pre-account application',usimPrepareBtn:'Prepaid USIM application',pwCheckTitle:'Password confirmation',pwCheckDesc:'Please re-enter your password to edit your profile.',confirmBtn:'Confirm',pwCheckFail:'Password does not match.',profileEditTitle:'Edit pre-registration info',profileEditDesc:'Update the fields and save your changes.',saveBtn:'Save',profileSaved:'Your registration information has been updated.',comingSoon:'This feature is coming soon.'}};['vi','id','km','zh','my','th'].forEach(k=>T[k]={...T.en});const META={ko:['🇰🇷','한국어'],en:['🇺🇸','English'],vi:['🇻🇳','Tiếng Việt'],id:['🇮🇩','Indonesia'],km:['🇰🇭','ខ្មែរ'],zh:['🇨🇳','中文'],my:['🇲🇲','မြန်မာ'],th:['🇹🇭','ไทย']};const NMAP={'Vietnam':'vi','China':'zh','Cambodia':'km','Indonesia':'id','Thailand':'th','Myanmar':'my','United States':'en','Canada':'en','Australia':'en','United Kingdom':'en','Singapore':'en','Malaysia':'en','Philippines':'en','Nepal':'en'};const LANGOPT={ko:'한국어',en:'English',vi:'Tiếng Việt',id:'Indonesia',km:'ខ្មែរ',zh:'中文',my:'မြန်မာ',th:'ไทย'};const state={lang:'ko',emailVerified:false,emailCodeSent:false,user:null};const pages={landing,step1,step2,complete};const inputs={lastName,firstName,birthDate,nationality,preferredLanguage,email,emailCode,password,passwordConfirm,phone,source,sourceDetail,snsChannel,snsAccount};const errs={lastName:lastNameErr,firstName:firstNameErr,birthDate:birthDateErr,gender:genderErr,nationality:nationalityErr,preferredLanguage:preferredLanguageErr,email:emailErr,emailCode:emailCodeErr,password:passwordErr,passwordConfirm:passwordConfirmErr,source:sourceErr,snsChannel:snsChannelErr,snsAccount:snsAccountErr};function pop(sel,items,ph){const prev=sel.value;sel.innerHTML='';const o=document.createElement('option');o.value='';o.textContent=ph;sel.appendChild(o);items.forEach(it=>{const op=document.createElement('option');op.value=it.value||it;op.textContent=it.label||it;sel.appendChild(op)});if([...sel.options].some(x=>x.value===prev))sel.value=prev}function setLang(lang){state.lang=lang;langFlag.textContent=META[lang][0];langLabel.textContent=META[lang][1];document.querySelectorAll('.mitem').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));document.querySelectorAll('[data-i18n]').forEach(n=>{const k=n.dataset.i18n;if(T[lang]&&T[lang][k]!==undefined)n.innerHTML=T[lang][k]});pwPolicy.textContent=T[lang].pwRule;pop(preferredLanguage,Object.entries(LANGOPT).map(([value,label])=>({value,label})),T[lang].preferredLangLabel);pop(nationality,optionData.nationality,T[lang].nationalityLabel);pop(source,optionData.source,T[lang].sourceLabel);pop(snsChannel,optionData.sns,T[lang].snsChannelLabel);pop(pPreferredLanguage,Object.entries(LANGOPT).map(([value,label])=>({value,label})),T[lang].preferredLangLabel);pop(pNationality,optionData.nationality,T[lang].nationalityLabel);pop(pSource,optionData.source,T[lang].sourceLabel);pop(pSnsChannel,optionData.sns,T[lang].snsChannelLabel);authBtn.textContent=state.user?T[lang].mypageTitle:T[lang].loginBtn}function show(id){Object.values(pages).forEach(p=>p.classList.remove('active'));pages[id].classList.add('active');floatingCTA.style.display=id==='landing'?'block':'none';window.scrollTo({top:0,behavior:'smooth'})}function sherr(node,on,msg){if(msg)node.textContent=msg;node.style.display=on?'block':'none'}function mail(v){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)}function gender(){const c=document.querySelector('input[name="gender"]:checked');return c?c.value:''}function validPassword(v){return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^*()_+\-=[\]{};':"\\|,.<>/?]).{8,}$/.test(v)}function valid1(){let ok=true;[['lastName',lastName.value.trim()],['firstName',firstName.value.trim()],['birthDate',birthDate.value],['nationality',nationality.value],['preferredLanguage',preferredLanguage.value]].forEach(([k,v])=>{sherr(errs[k],!v);if(!v)ok=false});sherr(genderErr,!gender());if(!gender())ok=false;return ok}function valid2(){let ok=true;sherr(emailErr,!mail(email.value.trim()));if(!mail(email.value.trim()))ok=false;sherr(emailCodeErr,!state.emailVerified);if(!state.emailVerified)ok=false;sherr(passwordErr,!validPassword(password.value),T[state.lang].passwordErr);if(!validPassword(password.value))ok=false;sherr(passwordConfirmErr,password.value!==passwordConfirm.value||!passwordConfirm.value,T[state.lang].passwordConfirmErr);if(password.value!==passwordConfirm.value||!passwordConfirm.value)ok=false;[['source',source.value],['snsChannel',snsChannel.value],['snsAccount',snsAccount.value.trim()]].forEach(([k,v])=>{sherr(errs[k],!v);if(!v)ok=false});return ok}function fillSummary(){sLast.textContent=lastName.value||'-';sFirst.textContent=firstName.value||'-';sBirth.textContent=birthDate.value||'-';sGender.textContent=gender()==='male'?T[state.lang].male:T[state.lang].female;sNation.textContent=nationality.value||'-';sLang.textContent=LANGOPT[preferredLanguage.value]||'-';sEmail.textContent=email.value||'-';sPhone.textContent=phone.value||'-';sSource.textContent=source.value||'-';sSourceDetail.textContent=sourceDetail.value||'-';sSns.textContent=snsChannel.value||'-';sSnsAcc.textContent=snsAccount.value||'-'}async function apiPost(payload){const r=await fetch(CONFIG.WEB_APP_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});return r.json()}function openModal(m){m.classList.add('open')}function closeModal(m){m.classList.remove('open')}langToggle.onclick=()=>langMenu.classList.toggle('open');document.addEventListener('click',e=>{if(!e.target.closest('.lang'))langMenu.classList.remove('open')});document.querySelectorAll('.mitem').forEach(b=>b.onclick=()=>{setLang(b.dataset.lang);langMenu.classList.remove('open')});homeBtn.onclick=()=>show('landing');floatingStartBtn.onclick=startBtn.onclick=()=>show('step1');backLanding.onclick=()=>show('landing');backStep1.onclick=()=>show('step1');toStep2.onclick=()=>{if(valid1())show('step2')};toStep3.onclick=async()=>{if(!valid2())return;const txt=toStep3.textContent;toStep3.disabled=true;toStep3.textContent='Saving...';try{const data=await apiPost({action:'submit',lastName:lastName.value.trim(),firstName:firstName.value.trim(),birthDate:birthDate.value,gender:gender(),nationality:nationality.value,preferredLanguage:preferredLanguage.value,email:email.value.trim(),password:password.value,phone:phone.value.trim(),source:source.value,sourceDetail:sourceDetail.value.trim(),snsChannel:snsChannel.value,snsAccount:snsAccount.value.trim(),createdAtClient:new Date().toISOString()});if(!data.success)throw new Error(data.message||'SAVE_FAILED');fillSummary();show('complete');alert(T[state.lang].savedOk)}catch(e){console.error(e);alert(e.message||T[state.lang].savedFail)}finally{toStep3.disabled=false;toStep3.textContent=T[state.lang].nextBtn}};resetBtn.onclick=()=>location.reload();nationality.onchange=()=>{const l=NMAP[nationality.value];if(l){setLang(l);preferredLanguage.value=l}};sendCode.onclick=()=>{if(!mail(email.value.trim())){sherr(emailErr,true);return}sherr(emailErr,false); ser=null;authBtn.textContent=T[state.lang].loginBtn;closeModal(mypageModal);alert(T[state.lang].logoutBtn+' OK')};bankPrepareBtn.onclick=()=>alert(T[state.lang].comingSoon);usimPrepareBtn.onclick=()=>alert(T[state.lang].comingSoon);editProfileBtn.onclick=()=>{closeModal(mypageModal);pwCheckInput.value='';pwCheckErr.style.display='none';openModal(pwCheckModal)};doPwCheckBtn.onclick=async()=>{if(!state.user)return;try{const data=await apiPost({action:'login',email:state.user.email,password:pwCheckInput.value});if(!data.success)throw new Error();state.user=data.user;fillProfileForm(data.user);closeModal(pwCheckModal);openModal(profileModal)}catch(e){pwCheckErr.textContent=T[state.lang].pwCheckFail;pwCheckErr.style.display='block'}};function fillProfileForm(u){pLastName.value=u.lastName||'';pFirstName.value=u.firstName||'';pBirthDate.value=(u.birthDate||'').slice(0,10);pGender.value=u.gender||'male';pNationality.value=u.nationality||'';pPreferredLanguage.value=u.preferredLanguage||'';pPhone.value=u.phone||'';pSource.value=u.source||'';pSourceDetail.value=u.sourceDetail||'';pSnsChannel.value=u.snsChannel||'';pSnsAccount.value=u.snsAccount||''}saveProfileBtn.onclick=async()=>{if(!state.user)return;profileErr.style.display='none';try{const data=await apiPost({action:'updateProfile',rowId:state.user.rowId,email:state.user.email,password:pwCheckInput.value,lastName:pLastName.value.trim(),firstName:pFirstName.value.trim(),birthDate:pBirthDate.value,gender:pGender.value,nationality:pNationality.value,preferredLanguage:pPreferredLanguage.value,phone:pPhone.value.trim(),source:pSource.value,sourceDetail:pSourceDetail.value.trim(),snsChannel:pSnsChannel.value,snsAccount:pSnsAccount.value.trim()});if(!data.success)throw new Error(data.message||'UPDATE_FAILED');state.user={...state.user,...data.user};closeModal(profileModal);alert(T[state.lang].profileSaved)}catch(e){profileErr.textContent=e.message||'Save failed';profileErr.style.display='block'}};setLang('ko');show('landing');</script></body></html>
