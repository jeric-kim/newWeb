<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>SBI Cosmoney Admin v2</title><style>:root{--primary:#3b45f3;--primary-strong:#2d36d9;--bg:#f6f8fc;--card:#fff;--line:#e5e7eb;--text:#111827;--sub:#667085;--danger:#dc2626;--ok:#059669;--shadow:0 16px 36px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif}.wrap{max-width:1180px;margin:0 auto;padding:28px 16px 40px}.login-card,.panel,.modal-card{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}.login-card{max-width:420px;margin:60px auto 0;padding:24px}h1,h2,h3{margin:0}.sub{margin-top:8px;color:var(--sub);font-size:14px;line-height:1.6}.field{margin-top:14px}.field.inline{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field label{display:block;margin-bottom:8px;font-size:13px;font-weight:800}input,select{width:100%;height:48px;padding:0 14px;border:1px solid #d8deee;border-radius:14px;background:#fff;font-size:15px}button{border:0;border-radius:16px;cursor:pointer;font-weight:900}.btn{height:52px;padding:0 16px;background:var(--primary);color:#fff}.btn:hover{background:var(--primary-strong)}.btn-outline{height:42px;padding:0 16px;background:#fff;border:1px solid var(--line);color:var(--text)}.btn-danger{height:38px;padding:0 12px;background:#fff;color:var(--danger);border:1px solid #fecaca}.btn-edit{height:38px;padding:0 12px;background:#fff;color:var(--primary);border:1px solid #c7d2fe}.error{margin-top:10px;color:var(--danger);font-size:13px;display:none}.ok{margin-top:10px;color:var(--ok);font-size:13px;display:none}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}.panel{padding:20px;display:none}.toolbar-actions{display:flex;gap:10px;flex-wrap:wrap}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}table{width:100%;border-collapse:collapse;min-width:1350px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}th{background:#f8faff;position:sticky;top:0;z-index:1}.count{font-size:14px;color:var(--sub)}.empty{padding:28px 16px;text-align:center;color:var(--sub)}.pill{display:inline-flex;align-items:center;height:28px;padding:0 10px;border-radius:999px;background:rgba(59,69,243,.08);color:var(--primary);font-weight:800;font-size:12px}.actions{display:flex;gap:8px;flex-wrap:wrap}.modal{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;align-items:center;justify-content:center;padding:16px;z-index:100}.modal.open{display:flex}.modal-card{width:min(760px,100%);padding:22px}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}.modal-body{display:grid;gap:14px;max-height:70vh;overflow:auto;padding-right:2px}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;flex-wrap:wrap}.close-x{width:40px;height:40px;border-radius:12px;background:#fff;border:1px solid var(--line)}@media (max-width:760px){.field.inline{grid-template-columns:1fr}table{min-width:1100px}}</style></head><body><div class="wrap"><div id="loginCard" class="login-card"><h1>Admin Login</h1><p class="sub">관리자 계정으로 로그인 후 신청 내역을 관리하세요.</p><div class="field"><label for="adminId">ID</label><input id="adminId" type="text" placeholder="admin" /></div><div class="field"><label for="adminPw">Password</label><input id="adminPw" type="password" placeholder="1111" /></div><button id="loginBtn" class="btn" type="button" style="width:100%;margin-top:18px;">로그인</button><div id="loginErr" class="error">ID 또는 비밀번호가 올바르지 않습니다.</div></div><div id="panel" class="panel"><div class="toolbar"><div><h2>SBI Cosmoney 신청 내역 관리</h2><div id="countText" class="count">총 0건</div></div><div class="toolbar-actions"><button id="addBtn" class="btn" type="button">신규 추가</button><button id="refreshBtn" class="btn-outline" type="button">새로고침</button><button id="downloadBtn" class="btn-outline" type="button">CSV 다운로드</button><button id="logoutBtn" class="btn-outline" type="button">로그아웃</button></div></div><div id="flashOk" class="ok"></div><div id="flashErr" class="error"></div><div class="table-wrap"><table><thead><tr><th>등록일시</th><th>영문 성</th><th>영문 이름</th><th>생년월일</th><th>성별</th><th>국적</th><th>선호 언어</th><th>이메일</th><th>휴대전화 번호</th><th>유입 경로</th><th>유입 경로 상세</th><th>SNS</th><th>SNS 계정</th><th>관리</th></tr></thead><tbody id="tbody"><tr><td colspan="14" class="empty">데이터를 불러오는 중입니다.</td></tr></tbody></table></div></div></div><div id="modal" class="modal"><div class="modal-card"><div class="modal-head"><div><h3 id="modalTitle">신규 추가</h3><p class="sub" id="modalSub">신청 정보를 입력하세요.</p></div><button id="closeModalBtn" class="close-x" type="button">✕</button></div><div class="modal-body"><div class="field inline"><div><label for="mLastName">영문 성</label><input id="mLastName" type="text" /></div><div><label for="mFirstName">영문 이름</label><input id="mFirstName" type="text" /></div></div><div class="field inline"><div><label for="mBirthDate">생년월일</label><input id="mBirthDate" type="date" /></div><div><label for="mGender">성별</label><select id="mGender"><option value="">선택</option><option value="male">male</option><option value="female">female</option></select></div></div><div class="field inline"><div><label for="mNationality">국적</label><select id="mNationality"></select></div><div><label for="mPreferredLanguage">선호 언어</label><select id="mPreferredLanguage"></select></div></div><div class="field inline"><div><label for="mEmail">이메일</label><input id="mEmail" type="email" /></div><div><label for="mPhone">휴대전화 번호</label><input id="mPhone" type="text" /></div></div><div class="field inline"><div><label for="mSource">유입 경로</label><select id="mSource"></select></div><div><label for="mSourceDetail">유입 경로 상세</label><input id="mSourceDetail" type="text" /></div></div><div class="field inline"><div><label for="mSnsChannel">SNS</label><select id="mSnsChannel"></select></div><div><label for="mSnsAccount">SNS 계정</label><input id="mSnsAccount" type="text" /></div></div><input id="mRowId" type="hidden" /><div id="modalErr" class="error"></div></div><div class="modal-actions"><button id="cancelBtn" class="btn-outline" type="button">취소</button><button id="saveBtn" class="btn" type="button">저장</button></div></div></div><script>const CONFIG={WEB_APP_URL:'https://script.google.com/macros/s/AKfycbzbYmDkETOUJ_Rkhm5C5CcK4IHGl06DMVdiaL_brQkQP-BZ6xANHWvcjKn26yQU7d9q8Q/exec',ADMIN_ID:'admin',ADMIN_PW:'1111'};const optionData={nationality:['Vietnam','China','Philippines','Nepal','Cambodia','Indonesia','United States','Canada','Australia','United Kingdom','Singapore','Malaysia','Thailand','Myanmar'],languages:['ko','en','vi','id','km','zh','my','th'],source:['Facebook','Instagram','Zalo','WhatsApp','Google Search','Friend Referral','Offline Partner','Etc'],sns:['Facebook','Zalo','Instagram','WhatsApp']};let rows=[];let editingId='';function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function escapeCsv(value){const v=String(value??'');if(/[",\n]/.test(v))return '"'+v.replace(/"/g,'""')+'"';return v}function showMsg(type,msg){flashOk.style.display='none';flashErr.style.display='none';if(!msg)return;const el=type==='ok'?flashOk:flashErr;el.textContent=msg;el.style.display='block'}function fillSelect(id, items, placeholder='선택'){const el=document.getElementById(id);el.innerHTML='';const first=document.createElement('option');first.value='';first.textContent=placeholder;el.appendChild(first);items.forEach(item=>{const op=document.createElement('option');op.value=item;op.textContent=item;el.appendChild(op)})}async function apiGet(action){const res=await fetch(CONFIG.WEB_APP_URL+'?action='+encodeURIComponent(action));return res.json()}async function apiPost(payload){const res=await fetch(CONFIG.WEB_APP_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});return res.json()}async function fetchRows(){const data=await apiGet('list');if(!data.success)throw new Error(data.message||'FETCH_FAILED');rows=data.rows||[];renderTable()}function renderTable(){countText.textContent=`총 ${rows.length}건`;if(!rows.length){tbody.innerHTML='<tr><td colspan="14" class="empty">저장된 신청 내역이 없습니다.</td></tr>';return}tbody.innerHTML=rows.map(r=>`<tr><td>${esc(r.createdAt||'')}</td><td>${esc(r.lastName||'')}</td><td>${esc(r.firstName||'')}</td><td>${esc(r.birthDate||'')}</td><td><span class="pill">${esc(r.gender||'')}</span></td><td>${esc(r.nationality||'')}</td><td>${esc(r.preferredLanguage||'')}</td><td>${esc(r.email||'')}</td><td>${esc(r.phone||'')}</td><td>${esc(r.source||'')}</td><td>${esc(r.sourceDetail||'')}</td><td>${esc(r.snsChannel||'')}</td><td>${esc(r.snsAccount||'')}</td><td><div class="actions"><button class="btn-edit" type="button" onclick="openEdit('${esc(r.rowId||'')}')">수정</button><button class="btn-danger" type="button" onclick="removeRow('${esc(r.rowId||'')}')">삭제</button></div></td></tr>`).join('')}function downloadCsv(){const headers=['createdAt','lastName','firstName','birthDate','gender','nationality','preferredLanguage','email','phone','source','sourceDetail','snsChannel','snsAccount'];const csv=[headers.join(','),...rows.map(r=>headers.map(h=>escapeCsv(r[h])).join(','))].join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=`cosmoney_prejoin_${Date.now()}.csv`;document.body.appendChild(link);link.click();link.remove();URL.revokeObjectURL(link.href)}function openModal(mode,row){editingId=mode==='edit'?(row.rowId||''):'';modalTitle.textContent=mode==='edit'?'신청 정보 수정':'신규 추가';modalSub.textContent=mode==='edit'?'선택한 신청 정보를 수정합니다.':'신청 정보를 직접 추가합니다.';mRowId.value=editingId;mLastName.value=row?.lastName||'';mFirstName.value=row?.firstName||'';mBirthDate.value=row?.birthDate||'';mGender.value=row?.gender||'';mNationality.value=row?.nationality||'';mPreferredLanguage.value=row?.preferredLanguage||'';mEmail.value=row?.email||'';mPhone.value=row?.phone||'';mSource.value=row?.source||'';mSourceDetail.value=row?.sourceDetail||'';mSnsChannel.value=row?.snsChannel||'';mSnsAccount.value=row?.snsAccount||'';modalErr.style.display='none';modal.classList.add('open')}function closeModal(){modal.classList.remove('open')}window.openEdit=function(rowId){const row=rows.find(r=>String(r.rowId)===String(rowId));if(!row){showMsg('err','수정할 데이터를 찾지 못했습니다.');return}openModal('edit',row)};window.removeRow=async function(rowId){if(!confirm('선택한 신청 정보를 삭제하시겠습니까?'))return;showMsg('', '');try{const data=await apiPost({action:'delete',rowId});if(!data.success)throw new Error(data.message||'DELETE_FAILED');showMsg('ok','삭제되었습니다.');await fetchRows()}catch(e){console.error(e);showMsg('err','삭제에 실패했습니다. Apps Script 코드가 CRUD 버전인지 확인해 주세요.')}};function validateModal(){if(!mLastName.value.trim()||!mFirstName.value.trim()||!mBirthDate.value||!mGender.value||!mNationality.value||!mPreferredLanguage.value||!mEmail.value.trim()||!mSource.value||!mSnsChannel.value||!mSnsAccount.value.trim()){modalErr.textContent='필수값을 모두 입력해 주세요.';modalErr.style.display='block';return false}modalErr.style.display='none';return true}async function saveModal(){if(!validateModal())return;const payload={action:editingId?'update':'submit',rowId:editingId,lastName:mLastName.value.trim(),firstName:mFirstName.value.trim(),birthDate:mBirthDate.value,gender:mGender.value,nationality:mNationality.value,preferredLanguage:mPreferredLanguage.value,email:mEmail.value.trim(),phone:mPhone.value.trim(),source:mSource.value,sourceDetail:mSourceDetail.value.trim(),snsChannel:mSnsChannel.value,snsAccount:mSnsAccount.value.trim(),createdAtClient:new Date().toISOString()};try{const data=await apiPost(payload);if(!data.success)throw new Error(data.message||'SAVE_FAILED');closeModal();showMsg('ok',editingId?'수정되었습니다.':'추가되었습니다.');await fetchRows()}catch(e){console.error(e);modalErr.textContent='저장에 실패했습니다. Apps Script 코드가 CRUD 버전인지 확인해 주세요.';modalErr.style.display='block'}}loginBtn.addEventListener('click',async()=>{const id=adminId.value.trim();const pw=adminPw.value.trim();if(id!==CONFIG.ADMIN_ID||pw!==CONFIG.ADMIN_PW){loginErr.style.display='block';return}loginErr.style.display='none';loginCard.style.display='none';panel.style.display='block';fillSelect('mNationality',optionData.nationality);fillSelect('mPreferredLanguage',optionData.languages);fillSelect('mSource',optionData.source);fillSelect('mSnsChannel',optionData.sns);try{await fetchRows()}catch(e){console.error(e);showMsg('err','데이터 조회에 실패했습니다. Apps Script 코드가 최신인지 확인해 주세요.')}});addBtn.addEventListener('click',()=>openModal('add'));refreshBtn.addEventListener('click',async()=>{showMsg('', '');try{await fetchRows()}catch(e){showMsg('err','새로고침에 실패했습니다.')}});downloadBtn.addEventListener('click',downloadCsv);logoutBtn.addEventListener('click',()=>location.reload());closeModalBtn.addEventListener('click',closeModal);cancelBtn.addEventListener('click',closeModal);saveBtn.addEventListener('click',saveModal);modal.addEventListener('click',e=>{if(e.target===modal)closeModal()});</script></body></html>
